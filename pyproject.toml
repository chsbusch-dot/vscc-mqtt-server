[tool.pytest.ini_options]
testpaths = ["tests"]
# Coverage gate: measures the worker module (what the unit tests exercise) and
# fails if it drops below the floor. The floor is intentionally just under the
# current level and should be ratcheted up as async-path tests land (WOR-7).
# test_api.py skips without a live worker, so CI coverage is unit-tests only.
addopts = "-ra --cov=vscc_mqtt_timescale_worker --cov-report=term-missing --cov-fail-under=18"

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
# E/F = pyflakes + pycodestyle errors, I = import sorting, B = bugbear,
# UP = pyupgrade. The legacy files were modernized (WOR-6), so no per-file
# grandfathering remains — everything is held to this set.
select = ["E", "F", "I", "B", "UP"]
# The worker deliberately uses terse one-line idioms (`if x: continue`), so the
# one-statement-per-colon/semicolon rules stay off. E501 (line length) is also
# relaxed repo-wide: the worker has long f-string HTML/JSON payloads where
# reflowing hurts readability more than it helps. All other E/F/I/B/UP rules
# apply everywhere — there is no per-file grandfathering anymore.
ignore = ["E701", "E702", "E501"]

[tool.mypy]
python_version = "3.11"
# Non-strict on day one: type the new code well, don't block on untyped deps.
ignore_missing_imports = true
warn_unused_ignores = true
warn_redundant_casts = true
# Follow imports (the worker is now type-clean, so no per-module override).
follow_imports = "silent"
