services:
  timescaledb:
    image: timescale/timescaledb:2.19.3-pg14
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: telemetry
    ports:
      - "5432:5432"
    volumes:
      - ./vscc-init-timescaledb.sql:/docker-entrypoint-initdb.d/init.sql
      - timescaledb_data:/var/lib/postgresql/data
    restart: unless-stopped

  vscc-emqx:
    image: emqx/emqx:6.0.0
    ports:
      - "1883:1883"
      - "8083:8083"
      - "8084:8084"
      - "18083:18083"
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: vscc-worker.Dockerfile
    depends_on:
      - timescaledb
      - vscc-emqx
    ports:
      - "8001:8000" # Expose FastAPI for historic data
    environment:
      - DB_DSN=postgresql://postgres:password@timescaledb:5432/telemetry
      - MQTT_BROKER=vscc-emqx
      - MONITOR_TZ=${MONITOR_TZ:-UTC} # default UTC to match the capture container; override for host capture
      - SESSION_LABEL_TZ=${SESSION_LABEL_TZ:-UTC} # localizes auto-session label text only (e.g. America/Los_Angeles); data stays UTC
    volumes:
      - ./VSCapture:/app/VSCapture
      - ./sessions:/sessions   # session exports as plain host files
    restart: unless-stopped

  # Capture from the monitor (LAN mode). Opt-in via the "capture" profile:
  #   MONITOR_IP=192.168.1.215 docker compose -f vscc-docker-compose.yml \
  #       --profile capture up -d --build capture
  # Writes the VSCapture export files into ./VSCapture, where the worker tails them.
  capture:
    profiles: ["capture"]
    build:
      context: .
      dockerfile: vscc-capture.Dockerfile
    environment:
      MONITOR_IP: ${MONITOR_IP:?Set MONITOR_IP, e.g. MONITOR_IP=192.168.1.215}
      WAVESET: ${WAVESET:-12}
      TZ: UTC   # stamps exports in UTC; the worker's MONITOR_TZ above must match
    volumes:
      - ./VSCapture:/data
    restart: unless-stopped
    stop_grace_period: 15s

  # Optional: serve the React dashboard from this host (single-host install).
  # Requires the client repo checked out as a sibling directory:
  #   git clone git@github.com:chsbusch-dot/vscc-dashboard-client.git ../vscc-dashboard-client
  # Start with: docker compose -f vscc-docker-compose.yml --profile dashboard up -d --build
  dashboard:
    profiles: ["dashboard"]
    build:
      context: ../vscc-dashboard-client
    environment:
      # Optional: backend host the dashboard targets (default: the serving host)
      VSCC_HOST: ${VSCC_HOST:-}
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  timescaledb_data: